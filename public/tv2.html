<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Logístico - CD Itaboraí</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a; --surface: #111111; --surface2: #181818;
      --border: #2a2a2a; --accent: #f0b429; --green: #00e676;
      --orange: #ff6d00; --blue: #4fc3f7; --muted: #888888;
      --text: #e0e0e0; --font-display: 'Source Sans 3', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-display);
      height: 100vh; overflow: hidden; display: grid;
      grid-template-columns: 58% 42%; grid-template-rows: 62% 38%;
      grid-template-areas: "principal fila" "inferior fila";
    }
    #overlay-inicio {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; text-align: center;
    }
    .topo {
      position: fixed; top: 0; left: 0; right: 0; height: 52px; padding: 0 36px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, #111, #0a0a0a); border-bottom: 1px solid var(--border); z-index: 10;
    }
    .status-conexao { display: flex; align-items: center; gap: 10px; }
    #ponto-conexao { width: 8px; height: 8px; border-radius: 50%; background: var(--green); transition: background 0.3s; }
    .area-principal { grid-area: principal; padding: 80px 36px 28px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .placa-mercosul { background: white; border-radius: 12px; border: 4px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.8); overflow: hidden; }
    .placa-topo { background: #1a3a8f; color: white; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.3em; text-align: center; padding: 6px 20px; font-family: 'Roboto Condensed', sans-serif; }
    .placa-numero { color: #111; font-family: 'Roboto Condensed', sans-serif; font-size: 8rem; font-weight: 700; padding: 10px 40px; line-height: 1; }
    .area-fila { grid-area: fila; background: var(--surface); padding-top: 64px; display: flex; flex-direction: column; }
    .fila-colunas { display: grid; grid-template-columns: 1fr 1fr; flex: 1; border-top: 1px solid var(--border); }
    .fila-secao { padding: 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .item-fila { background: var(--surface2); padding: 12px; margin-bottom: 8px; border-radius: 4px; border: 1px solid var(--border); }
    .placa-fila { font-size: 1.4rem; color: #fff; font-weight: 700; }
    .hora-fila { color: var(--accent); font-weight: 700; }
    .label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .badge { font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 2px; }
    .badge-descarregando { background: var(--orange); color: #000; }
    .badge-carregando { background: var(--blue); color: #000; }
    .badge-finalizado { background: var(--green); color: #000; }
  </style>
</head>
<body>

  <div id="overlay-inicio" onclick="iniciarPainel()">
    <div style="border: 2px solid var(--accent); padding: 40px; border-radius: 10px;">
      <h1 style="color: var(--accent); margin-bottom: 20px;">PAINEL LOGÍSTICO</h1>
      <p style="color: white; font-size: 1.2rem;">Toque para ativar o áudio e iniciar</p>
    </div>
  </div>

  <div class="topo">
    <div style="color: var(--accent); font-weight: 700;">CD — ITABORAÍ</div>
    <div class="status-conexao">
      <div id="ponto-conexao"></div>
      <div id="relogio">00:00</div>
    </div>
  </div>

  <div class="area-principal">
    <div id="painel-principal"></div>
  </div>

  <div class="area-inferior" style="grid-area: inferior; display: grid; grid-template-columns: 1fr 1fr; border-right: 1px solid var(--border);">
    <div id="painel-proximo" style="padding: 20px; border-right: 1px solid var(--border);"></div>
    <div id="painel-status" style="padding: 20px; background: #0d1a0f;"></div>
  </div>

  <div class="area-fila">
    <div class="fila-colunas">
      <div class="fila-secao">
        <div style="color: var(--orange); font-size: 0.7rem; font-weight: 700; margin-bottom: 10px;">↓ DESCARGA</div>
        <div id="fila-descarga"></div>
      </div>
      <div class="fila-secao">
        <div style="color: var(--blue); font-size: 0.7rem; font-weight: 700; margin-bottom: 10px;">↑ CARGA</div>
        <div id="fila-carga"></div>
      </div>
    </div>
  </div>

  <audio id="som-alerta" src="https://agenda-backend-production-5b72.up.railway.app/msn-wizz-sound.ogg?v=2"></audio>

  

  <script>
    var API_URL = 'https://agenda-backend-production-5b72.up.railway.app/agendamentos';
    var POLL_MS = 5000;
    var ultimoChamadoID = null;
    var ultimaPlacaVoz = "";
    var tempoSemChamada = 0;

    function iniciarPainel() {
      document.getElementById('overlay-inicio').style.display = 'none';
      var audio = document.getElementById('som-alerta');
      audio.play(); 
      setTimeout(function() { audio.pause(); audio.currentTime = 0; }, 100);
      setInterval(atualizarTV, POLL_MS);
      setInterval(atualizarRelogio, 1000);
      atualizarTV();
    }

    function atualizarRelogio() {
      var d = new Date();
      var h = d.getHours() < 10 ? '0' + d.getHours() : d.getHours();
      var m = d.getMinutes() < 10 ? '0' + d.getMinutes() : d.getMinutes();
      document.getElementById('relogio').innerHTML = h + ':' + m;
    }

    function anunciarVoz(placa, motorista) {
      if (!window.speechSynthesis || placa === ultimaPlacaVoz) return;
      ultimaPlacaVoz = placa;
      var texto = 'Atenção motorista ' + (motorista || '') + ' da placa ' + placa.split('').join(' ') + '. Dirija-se à área de descarga.';
      var msg = new SpeechSynthesisUtterance(texto);
      msg.lang = 'pt-BR';
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(msg);
    }

    function atualizarTV() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_URL, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var ponto = document.getElementById('ponto-conexao');
          if (xhr.status === 200) {
            ponto.style.background = '#00e676';
            processarDados(JSON.parse(xhr.responseText));
          } else {
            ponto.style.background = '#ff0000';
          }
        }
      };
      xhr.send();
    }

    // --- PROCESSAMENTO (O CÉREBRO) ---
    function processarDados(dados) {
      var chamando = null;
      var listaAgendados = [];

      for (var i = 0; i < dados.length; i++) {
        if (dados[i].status === 'chamando') chamando = dados[i];
        if (dados[i].status === 'agendado') listaAgendados.push(dados[i]);
      }

      // Ordena fila por horário
      listaAgendados.sort(function(a, b) {
        return new Date(a.data + ' ' + a.hora) - new Date(b.data + ' ' + b.hora);
      });

      var proximo = listaAgendados.length > 0 ? listaAgendados[0] : null;

      // Saídas para as engrenagens de renderização
      renderPrincipal(chamando);
      renderProximo(proximo);
      renderFilaDividida(listaAgendados);
      renderStatus(dados);

      // Lógica de áudio
      if (chamando) {
        if (ultimoChamadoID !== chamando.id) {
          ultimoChamadoID = chamando.id;
          document.getElementById('som-alerta').play();
          anunciarVoz(chamando.placa, chamando.motorista);
        }
        tempoSemChamada = 0;
      } else {
        tempoSemChamada += POLL_MS;
        ultimaPlacaVoz = "";
      }
    }

    // --- RENDERIZADORES (AS ENGRENAGENS) ---
    function renderPrincipal(chamando) {
      var painel = document.getElementById('painel-principal');
      if (chamando) {
        painel.innerHTML = '<div class="placa-mercosul"><div class="placa-topo">CHAMANDO AGORA</div><div class="placa-numero">' + chamando.placa + '</div></div>' +
                           '<div style="font-size: 3rem; color: var(--accent); margin-top: 20px;">' + chamando.hora + '</div>';
      } else {
        painel.innerHTML = '<div style="font-size: 2rem; color: var(--muted); opacity: 0.5;">Aguardando Chamada...</div>';
      }
    }

    function renderProximo(proximo) {
      var el = document.getElementById('painel-proximo');
      if (proximo) {
        el.innerHTML = '<div class="label">Próximo</div><div style="font-size: 3.5rem; font-weight: 700; color:#fff">' + proximo.placa + '</div>' +
                       '<div style="font-size: 1.5rem; color: var(--accent)">' + proximo.hora + '</div>';
      } else {
        el.innerHTML = '<div class="label">Próximo</div><div style="font-size: 2rem; color: var(--muted);">--</div>';
      }
    }

    function renderFilaDividida(ativos) {
      var htmlDescarga = ""; var htmlCarga = "";
      for (var i = 0; i < ativos.length; i++) {
        var card = '<div class="item-fila"><div style="display:flex; justify-content:space-between">' +
                   '<span class="placa-fila">' + ativos[i].placa + '</span><span class="hora-fila">' + ativos[i].hora + '</span></div></div>';
        if (ativos[i].tipo_operacao === 'CIF' || ativos[i].tipo_operacao === 'FOB') htmlCarga += card;
        else htmlDescarga += card;
      }
      document.getElementById('fila-descarga').innerHTML = htmlDescarga || '<div style="color:#444">Fila vazia</div>';
      document.getElementById('fila-carga').innerHTML = htmlCarga || '<div style="color:#444">Fila vazia</div>';
    }

    function renderStatus(dados) {
      var el = document.getElementById('painel-status');
      var emOperacao = null; var historico = [];
      for (var i = 0; i < dados.length; i++) {
        if (dados[i].status === 'descarregando' || dados[i].status === 'carregando') emOperacao = dados[i];
        if (dados[i].status === 'finalizado') historico.push(dados[i]);
      }
      historico.sort(function(a, b) { return b.id - a.id; });
      var ultimos = historico.slice(0, 2);

      var html = '<div style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;"><div class="label">Em Operação (Vaga 01)</div>';
      if (emOperacao) {
        var isCIF = (emOperacao.tipo_operacao === 'CIF' || emOperacao.tipo_operacao === 'FOB');
        html += '<div style="display: flex; justify-content: space-between; align-items: center;">' +
                '<span style="font-size: 1.8rem; font-weight: 700; color: #fff;">' + emOperacao.placa + '</span>' +
                '<span class="badge ' + (isCIF ? 'badge-carregando' : 'badge-descarregando') + '">' + (isCIF ? 'CARREGANDO' : 'DESCARREGANDO') + '</span></div>';
      } else {
        html += '<div style="color: var(--muted); font-style: italic;">Vaga disponível</div>';
      }
      html += '</div><div><div class="label">Últimos Finalizados</div>';
      for (var k = 0; k < ultimos.length; k++) {
        html += '<div style="display:flex; justify-content:space-between; margin-bottom:5px; opacity:0.7;">' +
                '<span>' + ultimos[k].placa + '</span><span class="badge badge-finalizado">OK</span></div>';
      }
      el.innerHTML = html;
    }
  </script>
</body>
</html>
