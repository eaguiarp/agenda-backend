<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Logístico - CD Itaboraí</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ─── VARIÁVEIS ─────────────────────────────────────────── */
    :root {
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface2:     #181818;
      --border:       #2a2a2a;
      --accent:       #f0b429;
      --green:        #00e676;
      --orange:       #ff6d00;
      --blue:         #4fc3f7;
      --muted:        #888888; /* Contraste melhorado de #555 para #888 */
      --text:         #e0e0e0;
      --font-display: 'Source Sans 3', sans-serif;
    }

    /* ─── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      font-variant-numeric: tabular-nums;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 58% 42%;
      grid-template-rows: 62% 38%;
      grid-template-areas:
        "principal fila"
        "inferior  fila";
    }

    /* ─── OVERLAY DE INÍCIO (Desbloqueio de Som) ─────────────── */
    #overlay-inicio {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-align: center;
    }

    /* ─── TOPO E HEARTBEAT ───────────────────────────────────── */
    .topo {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      padding: 0 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, #111, #0a0a0a);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .status-conexao {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #ponto-conexao {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      transition: background 0.3s;
    }

    /* ─── ÁREA PRINCIPAL E PLACA ────────────────────────────── */
    .area-principal {
      grid-area: principal;
      padding: 80px 36px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .placa-mercosul {
      background: white;
      border-radius: 12px;
      border: 4px solid #222;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      overflow: hidden;
    }
    .placa-topo {
      background: #1a3a8f;
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-align: center;
      padding: 6px 20px;
      font-family: 'Roboto Condensed', sans-serif;
    }
    .placa-numero {
      color: #111;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 8rem;
      font-weight: 700;
      padding: 10px 40px;
      line-height: 1;
    }

    /* ─── FILA E STATUS ─────────────────────────────────────── */
    .area-fila { grid-area: fila; background: var(--surface); padding-top: 64px; display: flex; flex-direction: column; }
    .fila-colunas { display: grid; grid-template-columns: 1fr 1fr; flex: 1; border-top: 1px solid var(--border); }
    .fila-secao { padding: 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .item-fila { background: var(--surface2); padding: 12px; margin-bottom: 8px; border-radius: 4px; border: 1px solid var(--border); }
    
    /* Estilo para TVs (Fonte grande) */
    .placa-fila { font-size: 1.4rem; color: #fff; font-weight: 700; }
    .hora-fila { color: var(--accent); font-weight: 700; }

    /* ─── MODO DESCANSO ─────────────────────────────────────── */
    .modo-descanso {
      position: fixed; inset: 0; background: #000;
      display: flex; align-items: center; justify-content: center;
      color: #333; font-size: 1.5rem; letter-spacing: 0.3em; z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="overlay-inicio" onclick="iniciarPainel()">
    <div style="border: 2px solid var(--accent); padding: 40px; border-radius: 10px;">
      <h1 style="color: var(--accent); margin-bottom: 20px;">PAINEL LOGÍSTICO</h1>
      <p style="color: white; font-size: 1.2rem;">Toque ou clique para ativar o áudio da TV</p>
    </div>
  </div>

  <div class="topo">
    <div class="titulo-cd">CD — Itaboraí</div>
    <div class="status-conexao">
      <div id="ponto-conexao"></div>
      <div class="relogio" id="relogio">00:00</div>
    </div>
  </div>

  <div class="area-principal" id="area-principal">
    <div id="painel-principal">
      <div style="opacity: 0.5;">Carregando dados...</div>
    </div>
  </div>

  <div class="area-inferior" style="grid-area: inferior; display: grid; grid-template-columns: 1fr 1fr; border-right: 1px solid var(--border);">
    <div id="painel-proximo" style="padding: 20px; border-right: 1px solid var(--border);">
      <div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Próximo</div>
      <div style="font-size: 3rem; font-weight: 700;">--</div>
    </div>
    <div id="painel-status" style="padding: 20px; background: #0d1a0f;">
      <div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Pátio</div>
    </div>
  </div>

  <div class="area-fila">
    <div class="fila-colunas">
      <div class="fila-secao">
        <div style="color: var(--orange); font-size: 0.7rem; font-weight: 700; margin-bottom: 10px;">[V] DESCARGA</div>
        <div id="fila-descarga"></div>
      </div>
      <div class="fila-secao">
        <div style="color: var(--blue); font-size: 0.7rem; font-weight: 700; margin-bottom: 10px;">[^] CARGA</div>
        <div id="fila-carga"></div>
      </div>
    </div>
  </div>

  <audio id="som-alerta" src="https://agenda-backend-production-5b72.up.railway.app/msn-wizz-sound.ogg?v=2"></audio>

  

  <script>
    // --- CONFIGURAÇÕES (VAR para ES5) ---
    var API_URL = 'https://agenda-backend-production-5b72.up.railway.app/agendamentos';
    var POLL_MS = 5000;
    
    // --- ESTADO DO SISTEMA ---
    var ultimoChamadoID = null;
    var ultimaPlacaVoz = ""; // Para não repetir a voz no mesmo ciclo
    var tempoSemChamada = 0;
    var descansoAtivo = false;
    var falhasConexao = 0;

    // --- FUNÇÃO INICIAL (Desbloqueio) ---
    function iniciarPainel() {
      document.getElementById('overlay-inicio').style.display = 'none';
      var audio = document.getElementById('som-alerta');
      audio.play(); // Toca e pausa para ganhar permissão
      setTimeout(function() { audio.pause(); audio.currentTime = 0; }, 100);
      
      // Inicia os loops
      setInterval(atualizarTV, POLL_MS);
      setInterval(atualizarRelogio, 1000);
      atualizarTV();
    }

    // --- HELPERS COMPATÍVEIS (Sem Arrow Functions) ---
    function pad(n) { return n < 10 ? '0' + n : n; }

    function formatarDataSimples(dataStr) {
      if (!dataStr) return '';
      var p = dataStr.split('-');
      return p[2] + '/' + p[1];
    }

    // --- LÓGICA DE VOZ (Melhorada para não cortar) ---
    function anunciarVoz(placa, motorista) {
      if (!window.speechSynthesis || placa === ultimaPlacaVoz) return;
      
      ultimaPlacaVoz = placa;
      var placaSoletrada = placa.split('').join(' ');
      var texto = 'Atenção motorista ' + (motorista || '') + ' da placa ' + placaSoletrada + '. Dirija-se à área de descarga.';
      
      var msg = new SpeechSynthesisUtterance(texto);
      msg.lang = 'pt-BR';
      msg.rate = 0.8;
      
      window.speechSynthesis.cancel(); // Limpa fila anterior
      window.speechSynthesis.speak(msg);
    }

    // --- POLLING COM XMLHttpRequest (ES5) ---
    function atualizarTV() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_URL, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var ponto = document.getElementById('ponto-conexao');
          
          if (xhr.status === 200) {
            falhasConexao = 0;
            ponto.style.background = '#00e676'; // Verde
            processarDados(JSON.parse(xhr.responseText));
          } else {
            falhasConexao++;
            if (falhasConexao > 2) ponto.style.background = '#ff0000'; // Vermelho (Erro)
          }
        }
      };
      xhr.send();
    }

    function processarDados(dados) {
      var chamando = null;
      var proximo = null;
      var listaAgendados = [];
      var listaPatio = [];

      // Filtra e Ordena (ES5)
      for (var i = 0; i < dados.length; i++) {
        var item = dados[i];
        if (item.status === 'chamando') chamando = item;
        if (item.status === 'agendado') listaAgendados.push(item);
        if (item.status === 'descarregando' || item.status === 'finalizado') listaPatio.push(item);
      }

      // Render Principal
      var painel = document.getElementById('painel-principal');
      if (chamando) {
        painel.innerHTML = 
          '<div class="placa-mercosul">' +
            '<div class="placa-topo">CHAMANDO AGORA</div>' +
            '<div class="placa-numero">' + chamando.placa + '</div>' +
          '</div>' +
          '<div style="font-size: 3rem; color: var(--accent); margin-top: 20px;">' + chamando.hora + '</div>';
        
        // Dispara Alerta Sonoro e Voz
        if (ultimoChamadoID !== chamando.id) {
          ultimoChamadoID = chamando.id;
          document.getElementById('som-alerta').play();
          anunciarVoz(chamando.placa, chamando.motorista);
        }
        tempoSemChamada = 0;
      } else {
        painel.innerHTML = '<div style="font-size: 2rem; color: var(--muted);">Aguardando Chamada...</div>';
        tempoSemChamada += POLL_MS;
        ultimaPlacaVoz = ""; // Reseta para próxima chamada
      }

      // Render Fila (Descarga vs Carga)
      var htmlDescarga = "";
      var htmlCarga = "";
      for (var j = 0; j < listaAgendados.length; j++) {
        var ag = listaAgendados[j];
        var card = '<div class="item-fila">' +
                     '<div style="display:flex; justify-content:space-between">' +
                       '<span class="placa-fila">' + ag.placa + '</span>' +
                       '<span class="hora-fila">' + ag.hora + '</span>' +
                     '</div>' +
                   '</div>';
        
        if (ag.tipo_operacao === 'CIF' || ag.tipo_operacao === 'FOB') htmlCarga += card;
        else htmlDescarga += card;
        
        if (!proximo) proximo = ag;
      }
      document.getElementById('fila-descarga').innerHTML = htmlDescarga || '<div style="color:#444">Fila vazia</div>';
      document.getElementById('fila-carga').innerHTML = htmlCarga || '<div style="color:#444">Fila vazia</div>';

      // Render Próximo
      if (proximo) {
        document.getElementById('painel-proximo').innerHTML = 
          '<div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Próximo</div>' +
          '<div style="font-size: 3.5rem; font-weight: 700; color:#fff">' + proximo.placa + '</div>' +
          '<div style="font-size: 1.5rem; color: var(--accent)">' + proximo.hora + '</div>';
      }

      // Anti Burn-in (Leve movimento a cada 5 min)
      if (new Date().getMinutes() % 5 === 0) {
        var offset = Math.floor(Math.random() * 5);
        document.body.style.transform = 'translate(' + offset + 'px, ' + offset + 'px)';
      }
    }

    function atualizarRelogio() {
      var d = new Date();
      document.getElementById('relogio').innerHTML = pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
  </script>
</body>
</html>
