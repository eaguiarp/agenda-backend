<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Logístico - CD Itaboraí</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0a0a0a; --surface: #111111; --surface2: #181818;
      --border: #2a2a2a; --accent: #f0b429; --green: #00e676;
      --orange: #ff6d00; --blue: #4fc3f7; --muted: #888888;
      --text: #e0e0e0; --font-display: 'Source Sans 3', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-display);
      height: 100vh; overflow: hidden; display: grid;
      grid-template-columns: 65% 35%; grid-template-rows: 62% 38%;
      grid-template-areas: "principal fila" "inferior fila";
    }

    #overlay-inicio {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; text-align: center;
    }

    .topo {
      position: fixed; top: 0; left: 0; right: 0; height: 52px; padding: 0 36px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, #111, #0a0a0a);
      border-bottom: 1px solid var(--border); z-index: 10;
    }
    .status-conexao { display: flex; align-items: center; gap: 10px; }
    #ponto-conexao { width: 8px; height: 8px; border-radius: 50%; background: var(--green); transition: background 0.3s; }

    .area-principal {
      grid-area: principal; padding: 60px 20px 12px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }

    .placa-mercosul {
      background: white; border-radius: 12px; border: 4px solid #222;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8); overflow: hidden;
    }
    .placa-topo {
      background: #1a3a8f; color: white;
      font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
      font-size: 1.2rem; font-weight: 700; letter-spacing: 0.3em;
      text-align: center; padding: 6px 20px; text-transform: uppercase;
    }
    .placa-numero {
      color: #111;
      font-family: "Bahnschrift", "DIN Alternate", "Franklin Gothic Condensed", "Roboto Condensed", sans-serif;
      font-size: 6rem; font-weight: 600; padding: 8px 30px; line-height: 0.95em;
      text-align: center; letter-spacing: 0.06em;
      display: block; transform: scaleX(0.9); transform-origin: center;
    }

    .aviso-epi {
      margin-top: 22px; background: #1a1200; border: 1px solid #f0b429;
      border-radius: 6px; padding: 14px 28px; text-align: center;
      display: flex; flex-direction: column; gap: 6px;
    }
    .aviso-linha { font-size: 0.85rem; letter-spacing: 0.1em; color: #f0b429; opacity: 0.85; }
    .aviso-linha.destaque { font-weight: 700; font-size: 1rem; letter-spacing: 0.15em; opacity: 1; }

    #video-container, #info-container {
      position: absolute; top: 52px; left: 0; right: 0; bottom: 0;
      background: #000; display: none;
      align-items: center; justify-content: center; z-index: 10;
    }
    #video-container.ativo { display: flex; }
    #info-container.ativo  { display: flex; }
    #player-video {
      width: auto; height: auto; max-width: 100%; max-height: 100%;
      object-fit: contain; background: #000;
    }

    #tela-espera {
      position: absolute; top: 52px; left: 0; right: 0; bottom: 0;
      background: var(--bg); display: none;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 9; gap: 20px;
    }
    #tela-espera.ativo { display: flex; }
    .espera-relogio {
      font-family: 'Roboto Condensed', sans-serif; font-size: 11rem;
      font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: 0.05em;
    }
    .espera-clima { display: flex; align-items: center; gap: 20px; color: var(--muted); font-size: 2rem; }
    .espera-clima-temp { font-size: 3rem; font-weight: 700; color: var(--text); }
    .espera-data { font-size: 1rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

    #tela-madrugada {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5000; gap: 16px;
    }
    #tela-madrugada.ativo { display: flex; }
    .madrugada-relogio {
      font-family: 'Roboto Condensed', sans-serif; font-size: 14rem;
      font-weight: 700; color: #1a1a1a; line-height: 1;
    }
    .madrugada-info { font-size: 0.75rem; letter-spacing: 0.3em; color: #1a1a1a; text-transform: uppercase; }

    /* CLIMA */




    .clima-wrap { width: 100%; max-width: 800px; text-align: center; padding: 20px; }
    .clima-titulo { font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 40px; }
    .clima-display-principal { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 30px; }
    .clima-icone-destaque { font-size: 7rem; }
    .clima-temp { font-size: 9rem; font-weight: 700; color: var(--accent); line-height: 0.8; font-family: 'Roboto Condensed', sans-serif; }
    .clima-box-detalhes {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
      padding: 25px; display: inline-block; min-width: 400px;
    }
    .clima-desc { font-size: 2.2rem; color: #fff; font-weight: 600; text-transform: capitalize; margin-bottom: 15px; }
    .clima-stats { display: flex; justify-content: center; gap: 50px; border-top: 1px solid var(--border); padding-top: 15px; }
    .clima-stat-item { min-width: 100px; }
    .clima-stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .clima-stat-valor { font-size: 1.3rem; color: var(--accent); font-weight: 700; }

    /* MAPA TOMTOM */
    .transito-mapa-wrap {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      position: relative; background: #0a0a0a;
    }
    .mapa-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px;
      background: linear-gradient(to bottom, rgba(10,10,10,0.95), rgba(10,10,10,0));
      pointer-events: none;
    }
    .mapa-titulo-texto { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: #888; }
    .mapa-atualizado { font-size: 0.65rem; letter-spacing: 0.1em; color: #444; }

    #mapa-transito { flex: 1; width: 100%; height: 100%; z-index: 1; }

    .mapa-legenda {
      position: absolute; bottom: 10px; left: 12px; z-index: 1000;
      background: rgba(17,17,17,0.92); border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 8px 12px;
      display: flex; flex-direction: column; gap: 5px; pointer-events: none;
    }
    .legenda-item { display: flex; align-items: center; gap: 8px; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa; }
    .legenda-cor { width: 28px; height: 5px; border-radius: 3px; }

    /* Marcador de origem */
    .marcador-origem {
      width: 14px; height: 14px; background: #f0b429;
      border: 3px solid #fff; border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(240,180,41,0.4);
    }

    /* Overrides Leaflet */
    .leaflet-container { background: #111 !important; }
    .leaflet-control-zoom a { background: #181818 !important; color: #888 !important; border-color: #2a2a2a !important; }
    .leaflet-control-zoom a:hover { background: #222 !important; color: #fff !important; }
    .leaflet-control-attribution { background: rgba(17,17,17,0.7) !important; color: #333 !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: #444 !important; }
    .leaflet-tooltip {
      background: rgba(17,17,17,0.92) !important; border: 1px solid #2a2a2a !important;
      color: #f0b429 !important; font-family: 'Source Sans 3', sans-serif !important;
      font-size: 0.75rem !important; font-weight: 700 !important;
      letter-spacing: 0.05em !important; padding: 4px 8px !important;
      border-radius: 4px !important; box-shadow: none !important;
    }
    .leaflet-tooltip-left::before, .leaflet-tooltip-right::before { border: none !important; }

    /* FILA */
    .area-fila { grid-area: fila; background: var(--surface); padding-top: 64px; display: flex; flex-direction: column; }
    .fila-colunas { display: grid; grid-template-columns: 1fr 1fr; flex: 1; border-top: 1px solid var(--border); overflow: hidden; }
    .fila-secao { padding: 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .fila-secao-titulo { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .item-fila { background: var(--surface2); padding: 10px 12px; margin-bottom: 8px; border-radius: 4px; border: 1px solid var(--border); border-left: 3px solid var(--border); }
    .item-fila.tipo-descarga { border-left-color: #ff6d00; }
    .item-fila.tipo-carga    { border-left-color: #4fc3f7; }
    .item-fila.primeiro      { background: #1a1200; border-left-color: #f0b429; }
    .fila-linha-topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .placa-fila  { font-size: 1.35rem; color: #fff; font-weight: 700; }
    .hora-fila   { color: #f0b429; font-weight: 700; font-size: 0.9rem; text-align: right; }
    .hora-fila-carga { color: #4fc3f7; font-weight: 700; font-size: 0.9rem; text-align: right; }

    .label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .badge { font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 2px; letter-spacing: 0.08em; }
    .badge-descarregando { background: #ff6d00; color: #000; }
    .badge-carregando    { background: #4fc3f7; color: #000; }
    .badge-finalizado    { background: #00e676; color: #000; }

    .badge-produto { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 2px; letter-spacing: 0.08em; margin-right: 3px; text-transform: uppercase; }
    .badge-cpiii { background-color: #800080; color: white; }
    .badge-cpii  { background-color: #AA0000; color: white; }
    .badge-cpv   { background-color: #C62828; color: white; }
    .badge-maua  { background-color: #117701; color: white; }
    .badge-m25   { background-color: #2FB201; color: black; }
    .badge-geral { background-color: #444;    color: #ccc;  }

    .area-inferior-grid { grid-area: inferior; display: grid; grid-template-columns: 1fr 1fr; border-right: 1px solid var(--border); }
    .box-proximo { padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; }
    .box-status  { padding: 20px; background: #0d1a0f; overflow-y: auto; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body>

  <div id="overlay-inicio" onclick="iniciarPainel()">
    <div style="border: 2px solid #f0b429; padding: 40px; border-radius: 10px;">
      <h1 style="color: #f0b429; margin-bottom: 20px; font-family: 'Source Sans 3', sans-serif;">PAINEL LOGISTICO</h1>
      <p style="color: white; font-size: 1.2rem;">Toque para ativar o audio e iniciar</p>
    </div>
  </div>

  <div id="tela-madrugada">
    <div class="madrugada-relogio" id="madrugada-relogio">00:00</div>
    <div class="madrugada-info">CD ITABORAÍ — PAINEL EM ESPERA</div>
  </div>

  <div class="topo">
    <div style="color: #f0b429; font-weight: 700; letter-spacing: 0.12em; font-size: 0.95rem;">CD &mdash; ITABORAÍ</div>
    <div class="status-conexao">
      <div id="ponto-conexao"></div>
      <div id="relogio" style="font-size: 0.95rem; letter-spacing: 0.08em; color: #888;">00:00</div>
    </div>
  </div>

  <div class="area-principal">
    <div id="painel-principal" style="display:none;"></div>

    <div id="tela-espera">
      <div class="espera-data" id="espera-data">--</div>
      <div class="espera-relogio" id="espera-relogio">00:00</div>
      <div class="espera-clima">
        <div class="espera-clima-icone" id="espera-icone">🌡️</div>
        <div class="espera-clima-temp" id="espera-temp">--°</div>
        <div id="espera-desc" style="font-size:1.2rem; color:var(--muted);">--</div>
      </div>
    </div>

    <div id="video-container">
      <video id="player-video" preload="auto" playsinline></video>
    </div>

    <div id="info-container">
     <div id="info-conteudo" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
    </div>
  </div>

  <div class="area-inferior-grid">
    <div class="box-proximo" id="painel-proximo">
      <div class="label">Próximo</div>
      <div style="font-size:2rem; color:#555;">--</div>
    </div>
    <div class="box-status">
      <div class="label">Status Patio</div>
      <div id="painel-status"></div>
    </div>
  </div>

  <div class="area-fila">
    <div class="fila-colunas">
      <div class="fila-secao">
        <div class="fila-secao-titulo" style="color:#ff6d00;">[⤓] DESCARGA</div>
        <div id="fila-descarga"></div>
      </div>
      <div class="fila-secao">
        <div class="fila-secao-titulo" style="color:#4fc3f7;">[⤒] CARGA</div>
        <div id="fila-carga"></div>
      </div>
    </div>
  </div>

  <audio id="som-alerta" src="https://agenda-backend-production-5b72.up.railway.app/msn-wizz-sound.ogg?v=2"></audio>
  <audio id="musica-fundo" src="/Sony Xperia.mp3" loop></audio>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ══════════════════════════════════════════════════════
    //  ⬇  TROQUE AQUI pela sua chave TomTom
    // ══════════════════════════════════════════════════════
    var TOMTOM_KEY = 'SUA_CHAVE_AQUI';
    // ══════════════════════════════════════════════════════

    var API_URL          = 'https://agenda-backend-production-5b72.up.railway.app/agendamentos';
    var POLL_MS          = 5000;
    var ultimoChamadoID  = null;
    var ultimaPlacaVoz   = '';

    var playlist    = ['/video1.mp4','/video2.mp4','/video3.mp4','/video4.mp4','/video5.mp4'];
    var indiceVideo = 0;
    var modoOcioso  = false;
    var modoInfo    = false;
    var timerInfo   = null;
    var indiceInfo  = 0;
    var dadosClima  = null;
    var horaUltimaAtualizacao = '--:--';

    var mapaLeaflet  = null;
    var cicloBonusFeito = false;
    var modeMadrugada   = false;

    // ── MADRUGADA ─────────────────────────────────────────
    function ehMadrugada() { var h = new Date().getHours(); return h >= 0 && h < 6; }

    function verificarMadrugada(chamando) {
      if (!ehMadrugada()) {
        if (modeMadrugada) {
          modeMadrugada = false; cicloBonusFeito = false;
          document.getElementById('tela-madrugada').className = '';
        }
        return false;
      }
      if (chamando) {
        document.getElementById('tela-madrugada').className = '';
        modeMadrugada = false; return false;
      }
      var agora = new Date(); var h = agora.getHours(); var m = agora.getMinutes();
      if (h === 3 && m < 5 && !cicloBonusFeito && !modoOcioso) {
        cicloBonusFeito = true; modeMadrugada = false;
        document.getElementById('tela-madrugada').className = '';
        modoOcioso = true; tocarVideo(indiceVideo); return true;
      }
      if (!modeMadrugada) {
        modeMadrugada = true;
        encerrarModoOcioso(); modoOcioso = false;
        document.getElementById('tela-espera').className = '';
        document.getElementById('tela-madrugada').className = 'ativo';
      }
      return true;
    }

    // ── INÍCIO ────────────────────────────────────────────
    function iniciarPainel() {
      document.getElementById('overlay-inicio').style.display = 'none';
      var alerta = document.getElementById('som-alerta');
      try { alerta.play(); } catch(e) {}
      setTimeout(function() { alerta.pause(); alerta.currentTime = 0; }, 100);
      var musica = document.getElementById('musica-fundo');
      musica.volume = 0; try { musica.play(); } catch(e) {}
      document.getElementById('player-video').addEventListener('ended', function() { proximoVideo(); });

      setInterval(atualizarTV,      POLL_MS);
      setInterval(atualizarRelogio, 1000);
      setInterval(atualizarClima,   3600000);
      atualizarRelogio();
      atualizarClima();

      if (!ehMadrugada()) { modoOcioso = true; tocarVideo(0); }
      else { modeMadrugada = true; document.getElementById('tela-madrugada').className = 'ativo'; }
      atualizarTV();
    }

    // ── RELÓGIO ───────────────────────────────────────────
    function atualizarRelogio() {
      var d = new Date();
      var h = d.getHours()   < 10 ? '0'+d.getHours()   : ''+d.getHours();
      var m = d.getMinutes() < 10 ? '0'+d.getMinutes() : ''+d.getMinutes();
      var hm = h+':'+m;
      document.getElementById('relogio').innerHTML           = hm;
      document.getElementById('madrugada-relogio').innerHTML = hm;
      document.getElementById('espera-relogio').innerHTML    = hm;
      var dias  = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
      var meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      document.getElementById('espera-data').innerHTML =
        dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()];
    }

    // ── CLIMA (apenas weather, trânsito agora é TomTom) ───
    function atualizarClima() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/weather', true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4 || xhr.status !== 200) return;
        try { dadosClima = JSON.parse(xhr.responseText); atualizarTelaEspera(); } catch(e) {}
      };
      xhr.send();
    }

    function atualizarTelaEspera() {
      if (!dadosClima) return;
      document.getElementById('espera-temp').innerHTML  = dadosClima.temperatura+'°';
      document.getElementById('espera-desc').innerHTML  = dadosClima.descricao || '';
      document.getElementById('espera-icone').innerHTML = iconeClima(dadosClima.descricao);
    }

    function mostrarTelaEspera() {
      document.getElementById('video-container').style.display  = 'none';
      document.getElementById('video-container').className      = '';
      document.getElementById('info-container').style.display   = 'none';
      document.getElementById('info-container').className       = '';
      document.getElementById('painel-principal').style.display = 'none';
      document.getElementById('tela-espera').className          = 'ativo';
      atualizarTelaEspera();
    }
    function esconderTelaEspera() { document.getElementById('tela-espera').className = ''; }

    document.addEventListener('keydown', function(e) {
      if (e.key==='n'||e.key==='N'||e.code==='Space') {
        if (modoOcioso && !modoInfo) proximoVideo();
        else if (modoInfo) { clearTimeout(timerInfo); tocarVideo(indiceVideo); }
      }
    });

    function encerrarModoOcioso() {
      modoOcioso = false; modoInfo = false;
      if (timerInfo) { clearTimeout(timerInfo); timerInfo = null; }
      document.getElementById('video-container').className     = '';
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('info-container').className      = '';
      document.getElementById('info-container').style.display  = 'none';
      document.getElementById('tela-espera').className         = '';
      document.getElementById('musica-fundo').volume           = 0;
      var v = document.getElementById('player-video'); v.volume = 0; v.pause();
      // Destrói mapa ao sair do modo ocioso para liberar memória
      if (mapaLeaflet) { mapaLeaflet.remove(); mapaLeaflet = null; }
    }

    function tocarVideo(idx) {
      modoInfo = false; esconderTelaEspera();
      var ic = document.getElementById('info-container');
      ic.style.display = 'none'; ic.className = '';
      var vc = document.getElementById('video-container');
      vc.style.display = 'flex'; vc.classList.add('ativo');
      document.getElementById('painel-principal').style.display = 'none';
      var v = document.getElementById('player-video');
      v.volume = 1; v.src = playlist[idx % playlist.length]; v.load();
      setTimeout(function() {
        if (!modoOcioso) return;
        var p = v.play();
        if (p) p.catch(function() { setTimeout(function() { if (modoOcioso) v.play(); }, 1000); });
      }, 300);
    }

    function proximoVideo() {
      indiceVideo = (indiceVideo + 1) % playlist.length;
      mostrarInfo();
    }

    function mostrarInfo() {
      modoInfo = true;
      document.getElementById('video-container').style.display  = 'none';
      document.getElementById('video-container').className      = '';
      document.getElementById('painel-principal').style.display = 'none';
      var ic = document.getElementById('info-container');
      ic.style.display = 'flex'; ic.className = 'ativo';
      if (indiceInfo % 2 === 0) renderInfoClima();
      else                       renderInfoTransito();
      indiceInfo++;
      clearTimeout(timerInfo);
      timerInfo = setTimeout(function() { if (modoOcioso) tocarVideo(indiceVideo); }, 20000);
    }

    // ── ÍCONE CLIMA ───────────────────────────────────────
    function iconeClima(d) {
      if (!d) return '🌡️'; d = d.toLowerCase();
      if (d.indexOf('sol')!=-1||d.indexOf('limpo')!=-1||d.indexOf('aberto')!=-1) return '☀️';
      if (d.indexOf('nublado')!=-1||d.indexOf('encoberto')!=-1) return '☁️';
      if (d.indexOf('nuvem')!=-1||d.indexOf('parcial')!=-1) return '⛅';
      if (d.indexOf('chuva')!=-1||d.indexOf('chuvisco')!=-1||d.indexOf('garoa')!=-1) return '🌧️';
      if (d.indexOf('tempest')!=-1||d.indexOf('trovão')!=-1) return '⛈️';
      if (d.indexOf('nebl')!=-1||d.indexOf('névoa')!=-1) return '🌫️';
      return '🌡️';
    }

    // ── RENDER CLIMA ──────────────────────────────────────
    function renderInfoClima() {
      var el = document.getElementById('info-conteudo');
      if (!dadosClima) { el.innerHTML = '<div class="clima-wrap"><div class="clima-titulo">CLIMA</div><div style="color:#444;text-align:center;">Carregando...</div></div>'; return; }
      var icone = iconeClima(dadosClima.descricao);
      var alertaChuva = '';
      if (dadosClima.previsao && dadosClima.previsao.toLowerCase().indexOf('chuva') !== -1)
        alertaChuva = '<div style="margin-top:15px;padding-top:10px;border-top:1px dashed rgba(255,255,255,0.1);color:#ff6d00;font-weight:700;font-size:0.85rem;">[!] PREVISÃO: '+dadosClima.previsao+'</div>';
      el.innerHTML =
        '<div class="clima-wrap">'+
          '<div class="clima-titulo">CONDIÇÕES METEOROLÓGICAS ATUAIS</div>'+
          '<div class="clima-display-principal">'+
            '<div class="clima-icone-destaque">'+icone+'</div>'+
            '<div class="clima-temp">'+dadosClima.temperatura+'°</div>'+
          '</div>'+
          '<div class="clima-box-detalhes">'+
            '<div class="clima-desc">'+dadosClima.descricao+'</div>'+
            '<div class="clima-stats">'+
              '<div class="clima-stat-item"><div class="clima-stat-label">Vento</div><div class="clima-stat-valor">'+dadosClima.vento+' km/h</div></div>'+
              '<div class="clima-stat-item"><div class="clima-stat-label">Condição</div><div class="clima-stat-valor">'+icone+'</div></div>'+
            '</div>'+alertaChuva+
          '</div>'+
        '</div>';
    }

    // ══════════════════════════════════════════════════════
    // ── RENDER TRÂNSITO — MAPA TOMTOM ────────────────────
    // ══════════════════════════════════════════════════════
    function renderInfoTransito() {
      var el = document.getElementById('info-conteudo');

      // Atualiza o timestamp
      var agora = new Date();
      var hh = agora.getHours()   < 10 ? '0'+agora.getHours()   : ''+agora.getHours();
      var mm = agora.getMinutes() < 10 ? '0'+agora.getMinutes() : ''+agora.getMinutes();
      horaUltimaAtualizacao = hh+':'+mm;

      el.innerHTML =
        '<div class="transito-mapa-wrap">'+
          '<div class="mapa-header">'+
            '<div class="mapa-titulo-texto">TRÂNSITO — REGIÃO DE ITABORAÍ</div>'+
            '<div class="mapa-atualizado">Atualizado: '+horaUltimaAtualizacao+'</div>'+
          '</div>'+
          '<div id="mapa-transito"></div>'+
          '<div class="mapa-legenda">'+
            '<div class="legenda-item"><div class="legenda-cor" style="background:#00c853;"></div>Livre</div>'+
            '<div class="legenda-item"><div class="legenda-cor" style="background:#ffd600;"></div>Moderado</div>'+
            '<div class="legenda-item"><div class="legenda-cor" style="background:#f44336;"></div>Congestionado</div>'+
          '</div>'+
        '</div>';

      setTimeout(function() {
        var container = document.getElementById('mapa-transito');
        if (!container) return;

        // Destrói mapa anterior se existir
        if (mapaLeaflet) { mapaLeaflet.remove(); mapaLeaflet = null; }

        // Cria mapa centrado em Itaboraí / região de São Gonçalo
        mapaLeaflet = L.map('mapa-transito', {
          center: [-22.820, -42.980],
          zoom: 11,
          zoomControl: true,
          attributionControl: true,
          dragging: false,
          scrollWheelZoom: false,
          doubleClickZoom: false,
          touchZoom: false
        });

        // ── CAMADA BASE: TomTom Mapa Escuro ──────────────
        // Estilo "night" do TomTom — fundo escuro, ideal para o painel
        L.tileLayer(
          'https://api.tomtom.com/map/1/tile/basic/night/{z}/{x}/{y}.png?key='+TOMTOM_KEY,
          {
            attribution: '© TomTom © OpenStreetMap',
            maxZoom: 18,
            tileSize: 256
          }
        ).addTo(mapaLeaflet);

        // ── CAMADA DE TRÂNSITO: TomTom Traffic Flow ──────
        // Esta camada colore as vias em verde/amarelo/vermelho
        // automaticamente com dados reais em tempo real.
        // Estilo "relative-delay": mostra o atraso relativo ao fluxo normal
        L.tileLayer(
          'https://api.tomtom.com/traffic/map/4/tile/flow/relative-delay/{z}/{x}/{y}.png?key='+TOMTOM_KEY,
          {
            attribution: '',
            maxZoom: 18,
            tileSize: 256,
            opacity: 0.85
          }
        ).addTo(mapaLeaflet);

        // ── MARCADOR: CD Itaboraí ─────────────────────────
        var origemIcon = L.divIcon({
          className: '',
          html: '<div class="marcador-origem"></div>',
          iconSize: [14, 14],
          iconAnchor: [7, 7]
        });

        L.marker([-22.7668, -42.8631], { icon: origemIcon })
          .addTo(mapaLeaflet)
          .bindTooltip('CD Itaboraí', {
            permanent: true,
            direction: 'right',
            offset: [10, 0]
          });

        // Força redraw após inserção no DOM
        setTimeout(function() {
          if (mapaLeaflet) mapaLeaflet.invalidateSize();
        }, 300);

      }, 100);
    }

    // ── VOZ ───────────────────────────────────────────────
    function anunciarVoz(placa, motorista) {
      if (!window.speechSynthesis || placa === ultimaPlacaVoz) return;
      ultimaPlacaVoz = placa;
      var txt = 'Atenção motorista '+(motorista ? motorista+' ' : '')+'da placa '+placa.split('').join(' ')+'. Dirija-se a area de descarga.';
      var msg = new SpeechSynthesisUtterance(txt);
      msg.lang = 'pt-BR';
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(msg);
    }

    // ── PRODUTO ───────────────────────────────────────────
    function simplificarNome(p) {
      var s = (p||'').toUpperCase();
      if (s.indexOf('CPIII')!=-1||s.indexOf('CP-III')!=-1||s.indexOf('RS-SC')!=-1) return 'CPIII';
      if (s.indexOf('MAUA')!=-1||s.indexOf('F-32-SC-V-MA')!=-1) return 'MAUA';
      if (s.indexOf('E32')!=-1||s.indexOf('E-32')!=-1) return 'E32';
      if (s.indexOf('M25')!=-1||s.indexOf('25-MA')!=-1) return 'M25KG';
      if (s.indexOf('CPV')!=-1||s.indexOf('ARI')!=-1) return 'CPV';
      if (s.indexOf('CPII')!=-1||s.indexOf('CP-II')!=-1) return 'CPII';
      return p||'';
    }
    function classeProduto(n) {
      if (n==='CPIII') return 'badge-cpiii';
      if (n==='MAUA')  return 'badge-maua';
      if (n==='E32')   return 'badge-cpii';
      if (n==='M25KG') return 'badge-m25';
      if (n==='CPV')   return 'badge-cpv';
      if (n==='CPII')  return 'badge-cpii';
      return 'badge-geral';
    }
    function badgesProduto(raw) {
      if (!raw) return '';
      var nomes = [];
      try {
        var parsed = JSON.parse(raw);
        if (parsed && parsed.length) for (var i=0;i<parsed.length;i++) { var n=simplificarNome(parsed[i].produto); if(n) nomes.push(n); }
      } catch(e) { var n2=simplificarNome(raw); if(n2) nomes.push(n2); }
      var html='';
      for (var j=0;j<nomes.length;j++) html+='<span class="badge-produto '+classeProduto(nomes[j])+'">'+nomes[j]+'</span>';
      return html;
    }

    // ── POLLING ───────────────────────────────────────────
    function atualizarTV() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_URL, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        var p = document.getElementById('ponto-conexao');
        if (xhr.status === 200) {
          p.style.background = '#00e676';
          try { processarDados(JSON.parse(xhr.responseText)); } catch(e) {}
        } else { p.style.background = '#ff0000'; }
      };
      xhr.send();
    }

    // ── PROCESSAMENTO ─────────────────────────────────────
    function processarDados(dados) {
      var chamando = null; var listaAgendados = [];
      for (var i=0;i<dados.length;i++) {
        if (dados[i].status==='chamando') chamando=dados[i];
        if (dados[i].status==='agendado') listaAgendados.push(dados[i]);
      }
      listaAgendados.sort(function(a,b){ return new Date(a.data+' '+a.hora)-new Date(b.data+' '+b.hora); });
      var proximo = listaAgendados.length > 0 ? listaAgendados[0] : null;

      if (verificarMadrugada(chamando)) {
        renderProximo(proximo); renderFilaDividida(listaAgendados); renderStatus(dados); return;
      }

      renderPrincipal(chamando); renderProximo(proximo);
      renderFilaDividida(listaAgendados); renderStatus(dados);

      if (chamando) {
        if (modoOcioso) encerrarModoOcioso();
        esconderTelaEspera();
        if (ultimoChamadoID !== chamando.id) {
          ultimoChamadoID = chamando.id;
          try { document.getElementById('som-alerta').play(); } catch(e) {}
          anunciarVoz(chamando.placa, chamando.motorista);
        }
        ultimaPlacaVoz = '';
      } else {
        ultimaPlacaVoz = ''; ultimoChamadoID = null;
        if (!modoOcioso) mostrarTelaEspera();
      }
    }

    // ── RENDER PRINCIPAL ──────────────────────────────────
    function renderPrincipal(chamando) {
      var painel = document.getElementById('painel-principal');
      if (chamando) {
        painel.style.display = 'block';
        var topo = chamando.motorista ? '[!] Chamando: '+chamando.motorista : 'CHAMANDO AGORA';
        painel.innerHTML =
          '<div class="placa-mercosul">'+
            '<div class="placa-topo">'+topo+'</div>'+
            '<div class="placa-numero">'+chamando.placa+'</div>'+
          '</div>'+
          '<div style="font-size:3rem;color:#f0b429;margin-top:16px;">'+chamando.hora+'</div>'+
          '<div class="aviso-epi">'+
            '<div class="aviso-linha">Desligue o motor &bull; Calce as rodas &bull; Entregue as chaves</div>'+
            '<div class="aviso-linha destaque">[!] USO OBRIGATORIO DE EPIs</div>'+
          '</div>';
      } else { if (modoOcioso) painel.style.display = 'none'; }
    }

    // ── RENDER PRÓXIMO ────────────────────────────────────
    function renderProximo(proximo) {
      var el = document.getElementById('painel-proximo');
      if (proximo) {
        var badges = badgesProduto(proximo.produto);
        el.innerHTML =
          '<div class="label">Próximo</div>'+
          '<div style="font-size:3.5rem;font-weight:700;color:#fff;line-height:1;">'+proximo.placa+'</div>'+
          '<div style="font-size:1.5rem;color:#f0b429;margin:4px 0;">'+proximo.hora+'</div>'+
          (badges?'<div style="margin-top:6px;">'+badges+'</div>':'');
      } else { el.innerHTML='<div class="label">Próximo</div><div style="font-size:2rem;color:#555;">--</div>'; }
    }

    // ── RENDER FILA ───────────────────────────────────────
    function renderFilaDividida(ativos) {
      var htmlD='', htmlC='', primD=true;
      for (var i=0;i<ativos.length;i++) {
        var item=ativos[i]; var isCarga=(item.tipo_operacao==='CIF'||item.tipo_operacao==='FOB');
        var badges=badgesProduto(item.produto);
        var cls;
        if (!isCarga && primD) { cls='item-fila primeiro'; primD=false; }
        else cls='item-fila '+(isCarga?'tipo-carga':'tipo-descarga');
        var horaHtml=isCarga
          ?'<span class="hora-fila-carga">'+item.hora+'<br><small style="font-size:0.75rem;opacity:0.6;">'+item.data.split('-').reverse().join('/')+'</small></span>'
          :'<span class="hora-fila">'+item.hora+'<br><small style="font-size:0.75rem;opacity:0.6;">'+item.data.split('-').reverse().join('/')+'</small></span>';
        var card='<div class="'+cls+'"><div class="fila-linha-topo"><span class="placa-fila">'+item.placa+'</span>'+horaHtml+'</div>'+(badges?'<div style="margin-top:4px;">'+badges+'</div>':'')+'</div>';
        if (isCarga) htmlC+=card; else htmlD+=card;
      }
      document.getElementById('fila-descarga').innerHTML=htmlD||'<div style="color:#444;font-size:0.8rem;margin-top:8px;">Fila vazia</div>';
      document.getElementById('fila-carga').innerHTML=htmlC||'<div style="color:#444;font-size:0.8rem;margin-top:8px;">Fila vazia</div>';
    }

    // ── RENDER STATUS ─────────────────────────────────────
    function renderStatus(dados) {
      var el=document.getElementById('painel-status'); var emOp=null; var hist=[];
      for (var i=0;i<dados.length;i++) {
        if (dados[i].status==='descarregando'||dados[i].status==='carregando') emOp=dados[i];
        if (dados[i].status==='finalizado') hist.push(dados[i]);
      }
      hist.sort(function(a,b){return b.id-a.id;}); var ult=hist.slice(0,2);
      var html='<div style="margin-bottom:15px;border-bottom:1px solid #2a2a2a;padding-bottom:10px;"><div class="label">Em Operacao</div>';
      if (emOp) {
        var isCIF=(emOp.tipo_operacao==='CIF'||emOp.tipo_operacao==='FOB');
        var bdP=badgesProduto(emOp.produto);
        html+='<div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:1.8rem;font-weight:700;color:#fff;">'+emOp.placa+'</span><span class="badge '+(isCIF?'badge-carregando':'badge-descarregando')+'">'+(isCIF?'CARREGANDO':'DESCARREGANDO')+'</span></div>'+(bdP?'<div style="margin-top:4px;">'+bdP+'</div>':'');
      } else html+='<div style="color:#555;font-style:italic;">Vaga disponivel</div>';
      html+='</div><div><div class="label">Ultimos Finalizados</div>';
      for (var k=0;k<ult.length;k++) html+='<div style="display:flex;justify-content:space-between;margin-bottom:5px;opacity:0.7;"><span>'+ult[k].placa+'</span><span class="badge badge-finalizado">OK</span></div>';
      el.innerHTML=html;
    }
  </script>
</body>
</html>
