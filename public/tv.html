<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Logístico - CD Itaboraí</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a; --surface: #111111; --surface2: #181818;
      --border: #2a2a2a; --accent: #f0b429; --green: #00e676;
      --orange: #ff6d00; --blue: #4fc3f7; --muted: #888888;
      --text: #e0e0e0; --font-display: 'Source Sans 3', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-display);
      height: 100vh; overflow: hidden; display: grid;
      grid-template-columns: 65% 35%; grid-template-rows: 62% 38%;
      grid-template-areas: "principal fila" "inferior fila";
    }

    /* --- OVERLAY --- */
    #overlay-inicio {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; text-align: center;
    }

    /* --- TOPO --- */
    .topo {
      position: fixed; top: 0; left: 0; right: 0; height: 52px; padding: 0 36px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, #111, #0a0a0a);
      border-bottom: 1px solid var(--border); z-index: 10;
    }
    .status-conexao { display: flex; align-items: center; gap: 10px; }
    #ponto-conexao { width: 8px; height: 8px; border-radius: 50%; background: var(--green); transition: background 0.3s; }

    /* --- AREA PRINCIPAL --- */
    .area-principal {
      grid-area: principal; padding: 60px 20px 12px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }

    /* --- PLACA MERCOSUL --- */
    .placa-mercosul {
      background: white; border-radius: 12px; border: 4px solid #222;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8); overflow: hidden;
    }
    .placa-topo {
      background: #1a3a8f; color: white; font-size: 1.2rem; font-weight: 700;
      letter-spacing: 0.3em; text-align: center; padding: 6px 20px;
      font-family: 'Roboto Condensed', sans-serif;
    }
    .placa-numero {
      color: #111; font-family: 'Roboto Condensed', sans-serif;
      font-size: 6rem; font-weight: 700; padding: 8px 30px; line-height: 1;
    }

    /* --- AVISO EPI --- */
    .aviso-epi {
      margin-top: 22px; background: #1a1200; border: 1px solid #f0b429;
      border-radius: 6px; padding: 14px 28px; text-align: center;
      display: flex; flex-direction: column; gap: 6px;
    }
    .aviso-linha { font-size: 0.85rem; letter-spacing: 0.1em; color: #f0b429; opacity: 0.85; }
    .aviso-linha.destaque { font-weight: 700; font-size: 1rem; letter-spacing: 0.15em; opacity: 1; }

    /* --- VIDEO PLAYER --- */
    #video-container {
  position: absolute; top: 52px; left: 0; right: 0; bottom: 0;
  background: #000; display: none; align-items: center; justify-content: center;
  overflow: hidden;
}
#video-container.ativo { display: flex; }
#player-video {
  width: auto;
  height: auto;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  background: #000;
}

   
    /* --- NOVO DESIGN CLIMA --- */
    .clima-wrap { 
        width: 100%; 
        max-width: 800px; 
        text-align: center; 
        padding: 20px;
    }
    
    .clima-titulo { 
        font-size: 0.8rem; 
        letter-spacing: 0.3em; 
        text-transform: uppercase; 
        color: var(--muted); 
        margin-bottom: 40px; 
    }

    .clima-display-principal {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
        margin-bottom: 30px;
    }

    .clima-icone-destaque {
        font-size: 7rem;
        filter: drop-shadow(0 0 15px rgba(240, 180, 41, 0.2));
    }

    .clima-temp { 
        font-size: 9rem; 
        font-weight: 700; 
        color: var(--accent); 
        line-height: 0.8;
        font-family: 'Roboto Condensed', sans-serif;
    }

    /* Box de Informações Adicionais (estilo card) */
    .clima-box-detalhes {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 25px;
        display: inline-block;
        min-width: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .clima-desc { 
        font-size: 2.2rem; 
        color: #fff; 
        font-weight: 600;
        text-transform: capitalize;
        margin-bottom: 15px;
    }

    .clima-stats {
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid var(--border);
        padding-top: 15px;
    }

    .clima-stat-item {
        display: flex;
        flex-direction: column;
    }

    .clima-stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .clima-stat-valor { font-size: 1.3rem; color: var(--accent); font-weight: 700; }
    
/* ========================================================
   🎨 ESTILIZAÇÃO DOS CARDS DE TRÂNSITO (MODERNO)
   ======================================================== */

/* Container principal */
.transito-wrap {
    padding: 10px;
    background: transparent;
    display: flex;
    flex-direction: column;
    gap: 8px; /* Espaçamento entre os cartões */
}

/* Estilo do Título da Seção */
.transito-titulo {
    font-size: 0.8rem;
    font-weight: bold;
    color: #ffd700; /* Destaque em dourado/amarelo */
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
}

/* Estrutura Base do Card Novo */
.transito-card-novo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-radius: 8px;
    color: #ffffff;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    border-left: 8px solid rgba(0, 0, 0, 0.2); /* Detalhe lateral para profundidade */
    transition: all 0.3s ease;
}

/* Corpo do texto dentro do card */
.card-corpo {
    display: flex;
    flex-direction: column;
}

.transito-destino-novo {
    font-weight: 800;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
}

.transito-detalhe {
    font-size: 0.9rem;
    font-weight: 400;
    opacity: 0.9;
}

/* Caixa de Status (Badge à direita) */
.card-status-box { 
    background: rgba(0, 0, 0, 0.15); /* Fundo escuro sutil para contraste */
    padding: 4px 10px;
    border-radius: 4px; /* Canto menos arredondado para parecer menos com botão */
    font-size: 0.7rem;
    font-weight: 700;
    min-width: 70px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    box-shadow: none;
    display: inline-block;
}

/* 🚥 CORES DINÂMICAS (VINDAS DO BACKEND) */

/* Status: VERDE (Livre) */
.card-verde {
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
}

/* Status: AMARELO (Moderado) */
.card-amarelo { 
    background: rgba(0, 0, 0, 0.08);
    color: #000 !important;
}
.card-amarelo .transito-detalhe { color: #000; opacity: 0.8; }
.card-amarelo .card-status-box { 
    border-color: rgba(0, 0, 0, 0.2); 
    color: #000; 
    background: rgba(0, 0, 0, 0.05);
}

/* Status: VERMELHO (Intenso) */
.card-vermelho {
    background: linear-gradient(135deg, #d32f2f, #b71c1c);
    animation: pulse-red 2s infinite; /* Efeito de pulso para trânsito crítico */
}

/* Status: CINZA (Sem Dados) */
.card-cinza {
    background: #424242;
    opacity: 0.7;
}

/* Animação para Alerta Crítico */
@keyframes pulse-red {
    0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); }
    100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
}

    /* --- FILA --- */
    .area-fila {
      grid-area: fila; background: var(--surface);
      padding-top: 64px; display: flex; flex-direction: column;
    }
    .fila-colunas {
      display: grid; grid-template-columns: 1fr 1fr;
      flex: 1; border-top: 1px solid var(--border); overflow: hidden;
    }
    .fila-secao {
      padding: 15px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .fila-secao-titulo {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; margin-bottom: 10px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .item-fila {
      background: var(--surface2); padding: 10px 12px; margin-bottom: 8px;
      border-radius: 4px; border: 1px solid var(--border); border-left: 3px solid var(--border);
    }
    .item-fila.tipo-descarga { border-left-color: #ff6d00; }
    .item-fila.tipo-carga    { border-left-color: #4fc3f7; }
    .item-fila.primeiro      { background: #1a1200; border-left-color: #f0b429; }
    .fila-linha-topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .placa-fila      { font-size: 1.35rem; color: #fff; font-weight: 700; }
    .hora-fila       { color: #f0b429; font-weight: 700; font-size: 0.9rem; text-align: right; }
    .hora-fila-carga { color: #4fc3f7; font-weight: 700; font-size: 0.9rem; text-align: right; }

    /* --- BADGES GERAIS --- */
    .label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .badge { font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 2px; letter-spacing: 0.08em; }
    .badge-descarregando { background: #ff6d00; color: #000; }
    .badge-carregando    { background: #4fc3f7; color: #000; }
    .badge-finalizado    { background: #00e676; color: #000; }

    /* --- BADGES PRODUTO --- */
    .badge-produto {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 2px 8px; border-radius: 2px; letter-spacing: 0.08em;
      margin-right: 3px; text-transform: uppercase;
    }
    .badge-cpiii { background-color: #1A4A92; color: white; }
    .badge-cpii  { background-color: #4A773C; color: white; }
    .badge-cpv   { background-color: #C62828; color: white; }
    .badge-maua  { background-color: #0D214F; color: white; }
    .badge-m25   { background-color: #E67E22; color: black; }
    .badge-geral { background-color: #444;    color: #ccc;  }

    /* --- INFERIOR --- */
    .area-inferior-grid {
      grid-area: inferior; display: grid; grid-template-columns: 1fr 1fr;
      border-right: 1px solid var(--border);
    }
    .box-proximo { padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; }
    .box-status  { padding: 20px; background: #0d1a0f; overflow-y: auto; }
    .item-status { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #1c1c1c; font-size: 0.95rem; }
    .item-status:last-child { border-bottom: none; }

    /* --- MODO DESCANSO --- */
    .modo-descanso {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000;
      display: flex; align-items: center; justify-content: center;
      color: #222; font-size: 1rem; letter-spacing: 0.2em; z-index: 9999;
    }

    /* --- SCROLLBAR --- */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- OVERLAY INICIO -->
  <div id="overlay-inicio" onclick="iniciarPainel()">
    <div style="border: 2px solid #f0b429; padding: 40px; border-radius: 10px;">
      <h1 style="color: #f0b429; margin-bottom: 20px; font-family: 'Source Sans 3', sans-serif;">PAINEL LOGISTICO</h1>
      <p style="color: white; font-size: 1.2rem;">Toque para ativar o audio e iniciar</p>
    </div>
  </div>

  <!-- TOPO -->
  <div class="topo">
    <div style="color: #f0b429; font-weight: 700; letter-spacing: 0.12em; font-size: 0.95rem;">CD &mdash; ITABORAÍ</div>
    <div class="status-conexao">
      <div id="ponto-conexao"></div>
      <div id="relogio" style="font-size: 0.95rem; letter-spacing: 0.08em; color: #888;">00:00</div>
    </div>
  </div>

  <!-- PRINCIPAL -->
  <div class="area-principal">
    <div id="painel-principal">
      <div style="font-size: 2rem; color: #555; opacity: 0.5;">Aguardando Chamada...</div>
    </div>
    <div id="video-container">
      <video id="player-video" preload="auto" playsinline></video>
    </div>
    <div id="info-container">
      <div id="info-conteudo"></div>
    </div>
  </div>

  <!-- INFERIOR -->
  <div class="area-inferior-grid">
    <div class="box-proximo" id="painel-proximo">
      <div class="label">Próximo</div>
      <div style="font-size:2rem; color:#555;">--</div>
    </div>
    <div class="box-status">
      <div class="label">Status Patio</div>
      <div id="painel-status"></div>
    </div>
  </div>

  <!-- FILA -->
  <div class="area-fila">
    <div class="fila-colunas">
      <div class="fila-secao">
        <div class="fila-secao-titulo" style="color:#ff6d00;">[⤓] DESCARGA</div>
        <div id="fila-descarga"></div>
      </div>
      <div class="fila-secao">
        <div class="fila-secao-titulo" style="color:#4fc3f7;">[⤒] CARGA</div>
        <div id="fila-carga"></div>
      </div>
    </div>
  </div>

  <!-- AUDIO -->
  <audio id="som-alerta" src="https://agenda-backend-production-5b72.up.railway.app/msn-wizz-sound.ogg?v=2"></audio>
  <audio id="musica-fundo" src="/Sony Xperia.mp3" loop></audio>

  <script>
    var API_URL         = 'https://agenda-backend-production-5b72.up.railway.app/agendamentos';
    var POLL_MS         = 5000;
    var ultimoChamadoID = null;
    var ultimaPlacaVoz  = '';
    var descansoAtivo   = false;

    var playlist = [
      '/video1.mp4',
      '/video2.mp4',
      '/video3.mp4',
      '/video4.mp4',
      '/video5.mp4'
    ];
    var indiceVideo   = 0;
    var modoOcioso    = false;
    var modoInfo      = false;
    var timerInfo     = null;
    var indiceInfo    = 0;
    var dadosClima    = null;
    var dadosTransito = null;

    // ── INICIO ───────────────────────────────────────────────
    function iniciarPainel() {
      document.getElementById('overlay-inicio').style.display = 'none';

      var alerta = document.getElementById('som-alerta');
      try { alerta.play(); } catch(e) {}
      setTimeout(function() { alerta.pause(); alerta.currentTime = 0; }, 100);

      var musica = document.getElementById('musica-fundo');
      musica.volume = 0;
      try { musica.play(); } catch(e) {}

      var video = document.getElementById('player-video');
      video.addEventListener('ended', function() { proximoVideo(); });

      setInterval(atualizarTV,      POLL_MS);
      setInterval(atualizarRelogio, 1000);
      setInterval(atualizarDados,   1800000);
      atualizarRelogio();
      atualizarDados();

      modoOcioso = true;
      tocarVideo(0);
      atualizarTV();
    }

    // ── RELOGIO ──────────────────────────────────────────────
    function atualizarRelogio() {
      var d = new Date();
      var h = d.getHours();
      var m = d.getMinutes();
      if (h < 10) h = '0' + h;
      if (m < 10) m = '0' + m;
      document.getElementById('relogio').innerHTML = h + ':' + m;
    }

    // ── DADOS CLIMA E TRANSITO ────────────────────────────────
    function atualizarDados() {
      var xhrW = new XMLHttpRequest();
      xhrW.open('GET', '/api/weather', true);
      xhrW.onreadystatechange = function() {
        if (xhrW.readyState !== 4 || xhrW.status !== 200) return;
        try { dadosClima = JSON.parse(xhrW.responseText); } catch(e) {}
      };
      xhrW.send();

      var xhrT = new XMLHttpRequest();
      xhrT.open('GET', '/api/traffic', true);
      xhrT.onreadystatechange = function() {
        if (xhrT.readyState !== 4 || xhrT.status !== 200) return;
        try { dadosTransito = JSON.parse(xhrT.responseText); } catch(e) {}
      };
      xhrT.send();
    }

    // ── PLAYLIST ─────────────────────────────────────────────
    function encerrarModoOcioso() {
      modoOcioso = false;
      modoInfo   = false;
      if (timerInfo) { clearTimeout(timerInfo); timerInfo = null; }

      document.getElementById('video-container').className = '';
      document.getElementById('info-container').className  = '';
      document.getElementById('painel-principal').style.display = '';
      document.getElementById('musica-fundo').volume = 0;

      var video = document.getElementById('player-video');
      video.volume = 0;  // silencia antes de pausar para evitar vazamento de audio
      video.pause();
    }

    function tocarVideo(idx) {
      modoInfo = false;
      document.getElementById('info-container').className  = '';
      document.getElementById('video-container').className = 'ativo';
      document.getElementById('painel-principal').style.display = 'none';
      document.getElementById('musica-fundo').volume = 0;

      var video = document.getElementById('player-video');
      video.volume = 1;  // restaura volume do vídeo
      video.src = playlist[idx % playlist.length];
      video.load();

      // FIX: só toca se não houver chamada ativa
      setTimeout(function() {
        if (modoOcioso) {
          var promise = video.play();
          if (promise !== undefined) {
            promise.catch(function() {
              setTimeout(function() { if (modoOcioso) video.play(); }, 1000);
            });
          }
        }
      }, 300);
    }

    function proximoVideo() {
      indiceVideo = (indiceVideo + 1) % playlist.length;
      mostrarInfo();
    }

    function mostrarInfo() {
      modoInfo = true;
      document.getElementById('video-container').className = '';
      document.getElementById('info-container').className  = 'ativo';
      document.getElementById('musica-fundo').volume = 0.18;

      if (indiceInfo === 0) { renderInfoClima(); }
      else                  { renderInfoTransito(); }
      indiceInfo = (indiceInfo + 1) % 2;

      timerInfo = setTimeout(function() {
        if (modoOcioso) tocarVideo(indiceVideo);
      }, 20000);
    }

    // ── RENDER CLIMA ──────────────────────────────────────────
    
    function renderInfoClima() {
      var el = document.getElementById('info-conteudo');
      if (!dadosClima) {
        el.innerHTML = '<div class="clima-wrap"><div class="clima-titulo">CLIMA — ITABORAÍ</div><div style="color:#444; text-align:center;">Carregando...</div></div>';
        return;
      }

      var icone = iconeClima(dadosClima.descricao);

      el.innerHTML = `
        <div class="clima-wrap">
          <div class="clima-titulo">CONDIÇÕES METEOROLÓGICAS ATUAIS</div>
          
          <div class="clima-display-principal">
            <div class="clima-icone-destaque">${icone}</div>
            <div class="clima-temp">${dadosClima.temperatura}°</div>
          </div>

          <div class="clima-box-detalhes">
            <div class="clima-desc">${dadosClima.descricao}</div>
            
            <div class="clima-stats">
              <div class="clima-stat-item">
                <span class="clima-stat-label">Vento</span>
                <span class="clima-stat-valor">${dadosClima.vento} km/h</span>
              </div>
              <div class="clima-stat-item">
                <span class="clima-stat-label">Umidade</span>
                <span class="clima-stat-valor">${dadosClima.umidade || '--'}%</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }
    // ── RENDER TRANSITO ───────────────────────────────────────
  
    function renderInfoTransito() {
      var el = document.getElementById('info-conteudo');
      if (!dadosTransito) {
        el.innerHTML = '<div class="transito-wrap"><div class="transito-titulo">TRANSITO</div><div style="color:#444; text-align:center;">Carregando...</div></div>';
        return;
      }
      
      var html = '<div class="transito-wrap"><div class="transito-titulo">TRÂNSITO A PARTIR DE ITABORAÍ</div>';
      
      for (var i = 0; i < dadosTransito.length; i++) {
        var d = dadosTransito[i];

        // Define a cor do card
        var classCard = 'card-verde';
        if (d.cor === 'yellow') classCard = 'card-amarelo';
        if (d.cor === 'red')    classCard = 'card-vermelho';
        if (d.cor === 'gray')   classCard = 'card-cinza';

        // Trata o texto de tempo e atraso
   var infoTempo = '-- min';
if (d.tempo) {
    if (d.tempo >= 60) {
        var horas = Math.floor(d.tempo / 60);
        var mins = d.tempo % 60;
        // Se os minutos forem 0, mostra só a hora, senão mostra 1h 38m
        infoTempo = mins > 0 ? horas + 'h ' + mins + 'm' : horas + 'h';
    } else {
        infoTempo = d.tempo + ' min';
    }
}

var atrasoTexto = d.atraso > 0 ? ' (+' + d.atraso + ' min)' : '';

        html +=
          '<div class="transito-card-novo ' + classCard + '">' +
            '<div class="card-corpo">' +
              '<div class="transito-destino-novo">' + d.destino + '</div>' +
              '<div class="transito-detalhe">' + infoTempo + atrasoTexto + '</div>' +
            '</div>' +
            '<div class="card-status-box">' + d.status + '</div>' +
          '</div>';
      }

      // Timestamp de atualização
      var agora = new Date();
      var dataHora = agora.toLocaleString('pt-BR'); // Atalho para formatar data/hora em PT-BR

      html += '<div style="text-align:center; margin-top:16px; font-size:0.7rem; color:#444; letter-spacing:0.1em;">Atualizado em: ' + dataHora + '</div>';
      html += '</div>';
      el.innerHTML = html;
    }

    // ── VOZ ──────────────────────────────────────────────────
    function anunciarVoz(placa, motorista) {
      if (!window.speechSynthesis || placa === ultimaPlacaVoz) return;
      ultimaPlacaVoz = placa;
      var trechoMot = motorista ? motorista + ' ' : '';
      var texto = 'Atenção motorista ' + trechoMot + 'da placa ' + placa.split('').join(' ') + '. Dirija-se a area de descarga.';
      var msg = new SpeechSynthesisUtterance(texto);
      msg.lang = 'pt-BR';
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(msg);
    }

    // ── PRODUTO ──────────────────────────────────────────────
    function simplificarNome(p) {
      var s = (p || '').toUpperCase();
      if (s.indexOf('CPIII')  !== -1 || s.indexOf('CP-III') !== -1 || s.indexOf('RS-SC') !== -1) return 'CPIII';
      if (s.indexOf('MAUA')   !== -1 || s.indexOf('F-32-SC-V-MA') !== -1) return 'MAUA';
      if (s.indexOf('E32')    !== -1 || s.indexOf('E-32')  !== -1) return 'E32';
      if (s.indexOf('M25')    !== -1 || s.indexOf('25-MA') !== -1) return 'M25KG';
      if (s.indexOf('CPV')    !== -1 || s.indexOf('ARI')   !== -1) return 'CPV';
      if (s.indexOf('CPII')   !== -1 || s.indexOf('CP-II') !== -1) return 'CPII';
      return p || '';
    }
    function classeProduto(n) {
      if (n === 'CPIII') return 'badge-cpiii';
      if (n === 'MAUA')  return 'badge-maua';
      if (n === 'E32')   return 'badge-cpii';
      if (n === 'M25KG') return 'badge-m25';
      if (n === 'CPV')   return 'badge-cpv';
      if (n === 'CPII')  return 'badge-cpii';
      return 'badge-geral';
    }
    function badgesProduto(raw) {
      if (!raw) return '';
      var nomes = [];
      try {
        var parsed = JSON.parse(raw);
        if (parsed && parsed.length) {
          for (var i = 0; i < parsed.length; i++) {
            var n = simplificarNome(parsed[i].produto);
            if (n) nomes.push(n);
          }
        }
      } catch(e) {
        var n2 = simplificarNome(raw);
        if (n2) nomes.push(n2);
      }
      var html = '';
      for (var j = 0; j < nomes.length; j++) {
        html += '<span class="badge-produto ' + classeProduto(nomes[j]) + '">' + nomes[j] + '</span>';
      }
      return html;
    }

    // ── POLLING ──────────────────────────────────────────────
    function atualizarTV() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_URL, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        var ponto = document.getElementById('ponto-conexao');
        if (xhr.status === 200) {
          ponto.style.background = '#00e676';
          try { processarDados(JSON.parse(xhr.responseText)); } catch(e) {}
        } else {
          ponto.style.background = '#ff0000';
        }
      };
      xhr.send();
    }

    // ── PROCESSAMENTO ────────────────────────────────────────
    function processarDados(dados) {
      var chamando       = null;
      var listaAgendados = [];
      for (var i = 0; i < dados.length; i++) {
        if (dados[i].status === 'chamando') chamando = dados[i];
        if (dados[i].status === 'agendado') listaAgendados.push(dados[i]);
      }
      listaAgendados.sort(function(a, b) {
        return new Date(a.data + ' ' + a.hora) - new Date(b.data + ' ' + b.hora);
      });

      var proximo = listaAgendados.length > 0 ? listaAgendados[0] : null;

      renderPrincipal(chamando);
      renderProximo(proximo);
      renderFilaDividida(listaAgendados);
      renderStatus(dados);

      if (chamando) {
        if (modoOcioso) encerrarModoOcioso();
        if (ultimoChamadoID !== chamando.id) {
          ultimoChamadoID = chamando.id;
          try { document.getElementById('som-alerta').play(); } catch(e) {}
          anunciarVoz(chamando.placa, chamando.motorista);
        }
        ultimaPlacaVoz = '';
      } else {
        ultimaPlacaVoz  = '';
        ultimoChamadoID = null;
        if (!modoOcioso) {
          modoOcioso = true;
          tocarVideo(indiceVideo);
        }
      }
    }

    // ── RENDER PRINCIPAL ─────────────────────────────────────
    function renderPrincipal(chamando) {
      var painel = document.getElementById('painel-principal');
      if (chamando) {
        var topoChamada = chamando.motorista
          ? '[!] Chamando: ' + chamando.motorista
          : 'CHAMANDO AGORA';
        painel.innerHTML =
          '<div class="placa-mercosul">' +
            '<div class="placa-topo">' + topoChamada + '</div>' +
            '<div class="placa-numero">' + chamando.placa + '</div>' +
          '</div>' +
          '<div style="font-size:3rem; color:#f0b429; margin-top:16px;">' + chamando.hora + '</div>' +
          '<div class="aviso-epi">' +
            '<div class="aviso-linha">Desligue o motor &bull; Calce as rodas &bull; Entregue as chaves</div>' +
            '<div class="aviso-linha destaque">[!] USO OBRIGATORIO DE EPIs</div>' +
          '</div>';
      } else {
        painel.innerHTML =
          '<div style="font-size:2rem; color:#555; opacity:0.5;">Aguardando Chamada...</div>';
      }
    }

    // ── RENDER PROXIMO ───────────────────────────────────────
    function renderProximo(proximo) {
      var el = document.getElementById('painel-proximo');
      if (proximo) {
        var badges = badgesProduto(proximo.produto);
        el.innerHTML =
          '<div class="label">Próximo</div>' +
          '<div style="font-size:3.5rem; font-weight:700; color:#fff; line-height:1;">' + proximo.placa + '</div>' +
          '<div style="font-size:1.5rem; color:#f0b429; margin:4px 0;">' + proximo.hora + '</div>' +
          (badges ? '<div style="margin-top:6px;">' + badges + '</div>' : '');
      } else {
        el.innerHTML = '<div class="label">Próximo</div><div style="font-size:2rem;color:#555;">--</div>';
      }
    }

    // ── RENDER FILA DIVIDIDA ─────────────────────────────────
    function renderFilaDividida(ativos) {
      var htmlDescarga = '';
      var htmlCarga    = '';
      var primeiroDesc = true;

      for (var i = 0; i < ativos.length; i++) {
        var item    = ativos[i];
        var isCarga = (item.tipo_operacao === 'CIF' || item.tipo_operacao === 'FOB');
        var badges  = badgesProduto(item.produto);

        var classeItem;
        if (!isCarga && primeiroDesc) { classeItem = 'item-fila primeiro'; primeiroDesc = false; }
        else { classeItem = 'item-fila ' + (isCarga ? 'tipo-carga' : 'tipo-descarga'); }

        var horaHtml = isCarga
          ? '<span class="hora-fila-carga">' + item.hora + '<br><small style="font-size:0.75rem; opacity:0.6;">' + item.data.split('-').reverse().join('/') + '</small></span>'
          : '<span class="hora-fila">'       + item.hora + '<br><small style="font-size:0.75rem; opacity:0.6;">' + item.data.split('-').reverse().join('/') + '</small></span>';

        var card =
          '<div class="' + classeItem + '">' +
            '<div class="fila-linha-topo">' +
              '<span class="placa-fila">' + item.placa + '</span>' + horaHtml +
            '</div>' +
            (badges ? '<div style="margin-top:4px;">' + badges + '</div>' : '') +
          '</div>';

        if (isCarga) htmlCarga    += card;
        else         htmlDescarga += card;
      }

      document.getElementById('fila-descarga').innerHTML =
        htmlDescarga || '<div style="color:#444;font-size:0.8rem;margin-top:8px;">Fila vazia</div>';
      document.getElementById('fila-carga').innerHTML =
        htmlCarga    || '<div style="color:#444;font-size:0.8rem;margin-top:8px;">Fila vazia</div>';
    }

    // ── RENDER STATUS ────────────────────────────────────────
    function renderStatus(dados) {
      var el = document.getElementById('painel-status');
      var emOperacao = null;
      var historico  = [];
      for (var i = 0; i < dados.length; i++) {
        if (dados[i].status === 'descarregando' || dados[i].status === 'carregando') emOperacao = dados[i];
        if (dados[i].status === 'finalizado') historico.push(dados[i]);
      }
      historico.sort(function(a, b) { return b.id - a.id; });
      var ultimos = historico.slice(0, 2);

      var html = '<div style="margin-bottom:15px;border-bottom:1px solid #2a2a2a;padding-bottom:10px;">' +
                 '<div class="label">Em Operacao</div>';
      if (emOperacao) {
        var isCIF  = (emOperacao.tipo_operacao === 'CIF' || emOperacao.tipo_operacao === 'FOB');
        var bdProd = badgesProduto(emOperacao.produto);
        html +=
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<span style="font-size:1.8rem;font-weight:700;color:#fff;">' + emOperacao.placa + '</span>' +
            '<span class="badge ' + (isCIF ? 'badge-carregando' : 'badge-descarregando') + '">' +
              (isCIF ? 'CARREGANDO' : 'DESCARREGANDO') + '</span>' +
          '</div>' +
          (bdProd ? '<div style="margin-top:4px;">' + bdProd + '</div>' : '');
      } else {
        html += '<div style="color:#555;font-style:italic;">Vaga disponivel</div>';
      }
      html += '</div><div><div class="label">Ultimos Finalizados</div>';
      for (var k = 0; k < ultimos.length; k++) {
        html += '<div style="display:flex;justify-content:space-between;margin-bottom:5px;opacity:0.7;">' +
                '<span>' + ultimos[k].placa + '</span>' +
                '<span class="badge badge-finalizado">OK</span></div>';
      }
      el.innerHTML = html;
    }

    // ── DESCANSO ─────────────────────────────────────────────
    function ativarDescanso() {
      if (descansoAtivo) return;
      descansoAtivo = true;
      var div = document.createElement('div');
      div.className = 'modo-descanso'; div.id = 'modoDescanso';
      div.innerHTML = 'PAINEL EM ESPERA';
      document.body.appendChild(div);
    }
    function desativarDescanso() {
      var el = document.getElementById('modoDescanso');
      if (el && el.parentNode) el.parentNode.removeChild(el);
      descansoAtivo = false;
    }

  </script>
</body>
