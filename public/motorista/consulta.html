<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Agendamento</title>
    <link rel="manifest" href="/motorista/manifest.json">
    <meta name="theme-color" content="#5a6b5c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --verde: #5a6b5c;
            --verde-claro: #7a9b7d;
            --laranja: #e67e22;
            --amarelo: #f1c40f;
            --vermelho-alerta: #e74c3c;
            --bg: #eef0eb;
        }

        body {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 30px 20px 40px;
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg);
            background-image: repeating-linear-gradient(
                0deg, transparent, transparent 39px,
                rgba(90,107,92,0.07) 39px, rgba(90,107,92,0.07) 40px
            );
        }

        /* ── CABEÇALHO ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            color: var(--verde);
            letter-spacing: 1px;
            line-height: 1.1;
            text-transform: uppercase;
        }
        .header h1 span {
            display: block;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--verde-claro);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .header p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* ── CARD DE BUSCA ── */
        .busca-container {
            width: 100%; max-width: 400px;
            background: white;
            padding: 28px 24px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(90,107,92,0.13);
            border-top: 4px solid var(--verde);
        }

        .label-placa {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
            display: block;
        }

        input#placa-busca {
            width: 100%; padding: 14px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.2rem; font-weight: 700;
            text-align: center; text-transform: uppercase;
            border: 2px solid #dde0d9;
            border-radius: 10px; margin-bottom: 14px;
            color: var(--verde);
            letter-spacing: 6px;
            transition: border-color 0.2s;
            outline: none;
        }
        input#placa-busca:focus { border-color: var(--verde); }

        button#btn-buscar {
            width: 100%; padding: 16px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.15rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            background: var(--verde); color: white;
            border: none; border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button#btn-buscar:active { transform: scale(0.98); background: #4a5a4c; }

        /* ── BOTÃO NOTIFICAR ── */
        #btn-notificar {
            margin-top: 12px; width: 100%; padding: 13px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            background: white; color: var(--laranja);
            border: 2px solid var(--laranja);
            border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s, color 0.2s;
        }
        #btn-notificar:hover { background: var(--laranja); color: white; }
        .notif-ativo {
            background: #fff8f0 !important;
            color: #b8601a !important;
            border-color: #f0a96a !important;
            cursor: default !important;
        }

        /* ── RESULTADO NORMAL ── */
        #resultado {
            margin-top: 20px; width: 100%; max-width: 400px; display: none;
        }
        #resultado h3 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.8rem; letter-spacing: 2px;
            text-transform: uppercase; color: #aaa;
            margin-bottom: 10px;
        }
        .resultado-item {
            margin-bottom: 14px; padding: 18px 20px;
            border-radius: 12px; text-align: center;
        }
        .resultado-item .hora-label {
            font-size: 0.78rem; color: #888;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .resultado-item .status-msg {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.3rem; font-weight: 700;
            margin-top: 6px; line-height: 1.3;
        }
        .agendado  { background: #e8f0e9; color: #2e5c31; border: 1px solid #c3dac5; }
        .finalizado{ background: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }

        /* ── OVERLAY DE ALERTA ── */
        #alerta-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(3px);
            align-items: center; justify-content: center;
            flex-direction: column;
        }
        #alerta-overlay.ativo { display: flex; }

        #alerta-box {
            background: #fff;
            border-radius: 20px;
            padding: 40px 32px 32px;
            max-width: 340px; width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            animation: entrar 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-top: 6px solid var(--vermelho-alerta);
        }

        @keyframes entrar {
            from { transform: scale(0.7) translateY(40px); opacity: 0; }
            to   { transform: scale(1) translateY(0);      opacity: 1; }
        }

        .alerta-icone {
            font-size: 4rem;
            animation: piscar-icone 0.6s infinite alternate;
            display: block; margin-bottom: 10px;
        }
        @keyframes piscar-icone {
            from { transform: scale(1); }
            to   { transform: scale(1.15); }
        }

        .alerta-titulo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.2rem; font-weight: 900;
            color: var(--vermelho-alerta);
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 12px;
            animation: piscar-texto 0.8s infinite alternate;
        }
        @keyframes piscar-texto {
            from { opacity: 1; }
            to   { opacity: 0.5; }
        }

        .alerta-placa {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.4rem; font-weight: 700;
            background: #f8f8f8;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 6px 16px;
            display: inline-block;
            color: #333;
            letter-spacing: 4px;
            margin-bottom: 16px;
        }

        .alerta-mensagem {
            font-size: 1rem;
            color: #555;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .alerta-mensagem strong {
            color: #222;
        }

        #btn-fechar-alerta {
            width: 100%; padding: 14px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            background: var(--vermelho-alerta); color: white;
            border: none; border-radius: 10px; cursor: pointer;
        }

        /* Fundo pulsante vermelho na tela toda quando chamando */
        @keyframes pulsar-fundo {
            0%   { box-shadow: inset 0 0 0 0 rgba(231,76,60,0); }
            50%  { box-shadow: inset 0 0 60px 20px rgba(231,76,60,0.18); }
            100% { box-shadow: inset 0 0 0 0 rgba(231,76,60,0); }
        }
        body.chamando { animation: pulsar-fundo 1s infinite; }

        /* ── INDICADOR DE ATUALIZAÇÃO ── */
        .atualizando {
            font-size: 0.72rem; color: #bbb;
            text-align: center; margin-top: 10px;
            letter-spacing: 1px;
        }
        .dot { display: inline-block; animation: dot 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    </style>
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
</head>
<body>

    <!-- OVERLAY DE ALERTA -->
    <div id="alerta-overlay">
        <div id="alerta-box">
            <span class="alerta-icone">🚨</span>
            <div class="alerta-titulo">Sua vez chegou!</div>
            <div class="alerta-placa" id="alerta-placa-texto">—</div>
            <div class="alerta-mensagem">
                <strong>Dirija-se à portaria agora.</strong><br>
                Siga as orientações do operador para iniciar a descarga.
            </div>
            <button id="btn-fechar-alerta">✔ ENTENDIDO</button>
        </div>
    </div>

    <!-- CABEÇALHO -->
    <div class="header">
        <h1>Sistema de Agendamento <span>CD · Itaboraí</span></h1>
        <p>Consulte sua posição na fila de descarga</p>
    </div>

    <!-- CARD DE BUSCA -->
    <div class="busca-container">
        <span class="label-placa">Placa do veículo</span>
        <input type="text" id="placa-busca" placeholder="ABC1D23" maxlength="7">
        <button id="btn-buscar">🔍 Ver minha posição</button>
        <button id="btn-notificar">🔔 Ativar aviso de chamada</button>
    </div>

    <div id="resultado"></div>

    <script>
        const API_URL = "https://agenda-backend-production-5b72.up.railway.app/agendamentos";
        let monitoramentoAtivo = false;
        let jaNotificou = false;

        // ── SOM DE ALERTA (Web Audio API — não precisa de arquivo externo) ──
        function tocarSomAlerta() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();

                function beep(freq, start, duration, volume) {
                    const osc  = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'square';
                    gain.gain.setValueAtTime(volume, ctx.currentTime + start);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
                    osc.start(ctx.currentTime + start);
                    osc.stop(ctx.currentTime + start + duration + 0.05);
                }

                // Sequência de bipes de alerta
                beep(880, 0.0,  0.15, 0.4);
                beep(880, 0.2,  0.15, 0.4);
                beep(880, 0.4,  0.15, 0.4);
                beep(1100, 0.7, 0.4,  0.5);
                beep(880, 1.2,  0.15, 0.4);
                beep(880, 1.4,  0.15, 0.4);
                beep(1100, 1.7, 0.5,  0.5);
            } catch(e) {
                console.log("Audio não disponível:", e);
            }
        }

        // ── BOTÃO NOTIFICAR ──
        document.getElementById('btn-notificar').addEventListener('click', () => {
            // Toca o som para "desbloquear" o AudioContext no iOS (requer gesto do usuário)
            tocarSomAlerta();

            if (!('Notification' in window)) {
                alert("Seu navegador não suporta notificações. O alerta visual e vibração continuarão funcionando.");
                return;
            }

            Notification.requestPermission().then(perm => {
                const btn = document.getElementById('btn-notificar');
                if (perm === 'granted') {
                    btn.textContent = '✅ Aviso ativado — você será chamado';
                    btn.classList.add('notif-ativo');
                    btn.disabled = true;
                } else {
                    btn.textContent = '⚠️ Permissão negada — só alerta visual';
                    btn.style.borderColor = '#aaa';
                    btn.style.color = '#aaa';
                }
            });
        });

        // ── BOTÃO BUSCAR ──
        document.getElementById('btn-buscar').addEventListener('click', async () => {
            const placa = document.getElementById('placa-busca').value.trim().toUpperCase();
            if (placa.length < 3) { alert("Digite a placa completa."); return; }

            buscarEExibir(placa);

            if (!monitoramentoAtivo) {
                monitoramentoAtivo = true;
                setInterval(() => buscarEExibir(placa), 10000);
            }
        });

        // ── FECHAR ALERTA ──
        document.getElementById('btn-fechar-alerta').addEventListener('click', () => {
            document.getElementById('alerta-overlay').classList.remove('ativo');
            document.body.classList.remove('chamando');
        });

        // ── FUNÇÃO PRINCIPAL ──
        async function buscarEExibir(placa) {
            const resDiv = document.getElementById('resultado');
            try {
                const response = await fetch(API_URL);
                const dados = await response.json();
                const hojeStr = new Date().toISOString().split("T")[0];

                const meusAgendamentos = dados.filter(a =>
                    a.placa.toUpperCase() === placa && a.data >= hojeStr
                );

                resDiv.style.display = "block";
                resDiv.innerHTML = "";

                if (meusAgendamentos.length > 0) {
                    let htmlBase = `<h3>Placa ${placa}</h3>`;

                    meusAgendamentos.sort((a, b) => new Date(`${a.data} ${a.hora}`) - new Date(`${b.data} ${b.hora}`));

                    meusAgendamentos.forEach(item => {
                        let statusMsg = "";
                        let classeStatus = "";

                        if (item.status === 'chamando') {
                            // Dispara alerta completo
                            if (!jaNotificou) {
                                dispararAlerta(item.placa);
                                jaNotificou = true;
                            }
                            // Card resumido abaixo do overlay (caso feche o overlay)
                            statusMsg = "⚠️ SUA VEZ — Vá à portaria";
                            classeStatus = "agendado";
                            document.body.classList.add('chamando');

                        } else if (item.status === 'finalizado') {
                            statusMsg = "✅ Operação finalizada";
                            classeStatus = "finalizado";
                            jaNotificou = false;
                            document.body.classList.remove('chamando');
                            document.getElementById('alerta-overlay').classList.remove('ativo');

                        } else {
                            const unidadeAtual = item.unidade || 'itaborai';
                            const filaHoje = dados.filter(a =>
                                a.data === hojeStr &&
                                a.status === 'agendado' &&
                                (a.unidade || 'itaborai') === unidadeAtual
                            );
                            filaHoje.sort((a, b) => new Date(`${a.data} ${a.hora}`) - new Date(`${b.data} ${b.hora}`));
                            const posicao = filaHoje.findIndex(a => a.id === item.id);

                            if (posicao === 0) {
                                statusMsg = "Você é o próximo! Fique atento.";
                            } else if (posicao > 0) {
                                statusMsg = `<strong>${posicao}</strong> veículo${posicao > 1 ? 's' : ''} na sua frente`;
                            } else {
                                statusMsg = "Aguardando na fila";
                            }
                            classeStatus = "agendado";
                            jaNotificou = false;
                            document.body.classList.remove('chamando');
                        }

                        htmlBase += `
                            <div class="resultado-item ${classeStatus}">
                                <div class="hora-label">Horário previsto: ${item.hora}</div>
                                <div class="status-msg">${statusMsg}</div>
                            </div>
                        `;
                    });

                    // Indicador de monitoramento ativo
                    htmlBase += `
                        <div class="atualizando">
                            Monitorando
                            <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
                            atualiza a cada 10s
                        </div>`;

                    resDiv.innerHTML = htmlBase;
                } else {
                    resDiv.innerHTML = "<p style='text-align:center;color:#aaa;font-size:0.9rem;margin-top:10px'>Nenhum agendamento encontrado para hoje.</p>";
                }
            } catch (error) { console.error("Erro na consulta", error); }
        }

        // ── DISPARAR ALERTA COMPLETO ──
        function dispararAlerta(placa) {
            // 1. Overlay visual
            document.getElementById('alerta-placa-texto').textContent = placa;
            document.getElementById('alerta-overlay').classList.add('ativo');

            // 2. Vibração longa
            if ('vibrate' in navigator) {
                navigator.vibrate([800, 200, 800, 200, 800, 200, 1500]);
            }

            // 3. Som
            tocarSomAlerta();

            // 4. Notificação do sistema (se permitida)
            if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
                new Notification("🚨 SUA VEZ CHEGOU!", {
                    body: `Placa ${placa} — Dirija-se à portaria agora.`,
                    icon: "/motorista/icon-192.png",
                    tag: 'chamada-motorista',
                    renotify: true
                });
            }
        }

        // ── SERVICE WORKER ──
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/motorista/sw.js');
        }
    </script>
</body>
</html>
